<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <title>eCampus</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Noto+Sans+Arabic:wght@400;700;800;900&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: #003450;
        font-family: "Noto Sans Arabic", "Inter", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* Background decorative circles */
      .bg-circle-1 {
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(245, 143, 3, 0.12) 0%,
          transparent 70%
        );
        top: -200px;
        right: -150px;
      }
      .bg-circle-2 {
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(245, 143, 3, 0.08) 0%,
          transparent 70%
        );
        bottom: -150px;
        left: -100px;
      }
      .bg-circle-3 {
        position: absolute;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.04) 0%,
          transparent 70%
        );
        top: 50px;
        left: 200px;
      }

      /* Grid pattern overlay */
      .grid-overlay {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
      }

      /* Bottom accent line */
      .bottom-accent {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: linear-gradient(90deg, #f58f03, #f5a524, #f58f03);
      }

      /* Top accent line */
      .top-accent {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, #f58f03, transparent);
        opacity: 0.6;
      }

      /* Main content */
      .content {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        padding: 0 80px;
        text-align: center;
      }

      /* Logo badge */
      .logo-badge {
        display: flex;
        align-items: center;
        gap: 14px;
        background: rgba(245, 143, 3, 0.15);
        border: 1.5px solid rgba(245, 143, 3, 0.4);
        border-radius: 50px;
        padding: 10px 28px;
      }
      .logo-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #f58f03;
        box-shadow: 0 0 12px rgba(245, 143, 3, 0.8);
      }
      .logo-text {
        font-size: 22px;
        font-weight: 800;
        color: #f58f03;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* Main title */
      .main-title {
        font-size: 80px;
        font-weight: 900;
        color: #ffffff;
        line-height: 1.05;
        letter-spacing: -1px;
      }
      .main-title span {
        color: #f58f03;
      }

      /* Subtitle */
      .subtitle {
        font-size: 26px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.65);
        max-width: 800px;
        line-height: 1.5;
      }

      /* Tags row */
      .tags {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .tag {
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.75);
        padding: 6px 18px;
        border-radius: 20px;
        font-size: 15px;
        font-weight: 500;
      }

      /* Domain */
      .domain {
        position: absolute;
        bottom: 26px;
        right: 48px;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.35);
        letter-spacing: 1px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div class="bg-circle-1"></div>
    <div class="bg-circle-2"></div>
    <div class="bg-circle-3"></div>
    <div class="grid-overlay"></div>
    <div class="top-accent"></div>
    <div class="bottom-accent"></div>

    <div class="content">
      <div class="logo-badge">
        <div class="logo-dot"></div>
        <span class="logo-text">ecampus</span>
        <div class="logo-dot"></div>
      </div>

      <div class="main-title">e<span>Campus</span></div>

      <div class="subtitle">
        منصة التعلم الجامعي الأردنية&nbsp;&nbsp;·&nbsp;&nbsp;University Learning
        Platform for Jordan
      </div>

      <div class="tags">
        <span class="tag">مواد دراسية</span>
        <span class="tag">Study Materials</span>
        <span class="tag">امتحانات سابقة</span>
        <span class="tag">Past Exams</span>
        <span class="tag">اختبارات تفاعلية</span>
        <span class="tag">Quizzes</span>
        <span class="tag">دورات أكاديمية</span>
      </div>
    </div>

    <div class="domain">ecampusjo.com</div>
  </body>
</html>
