server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;
    gzip_min_length 1000;

    # ── API proxy — forward /api/* to the backend container ─────────────────
    # The browser calls /api/... (relative), Nginx forwards internally.
    # This avoids CORS entirely — same origin from the browser's perspective.
    location /api/ {
        proxy_pass         http://ecampus_backend:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Hashed static assets — cache forever ────────────────────────────────
    # Vite fingerprints every file under /assets/ so long expiry is safe.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Pre-rendered HTML pages — short cache ───────────────────────────────
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, no-cache";
    }

    # ── SPA fallback — send everything else to index.html ───────────────────
    # React Router handles client-side routing from there.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
