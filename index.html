<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Uni-Hub | Your Complete University Learning Platform</title>
    <meta
      name="title"
      content="Uni-Hub | Your Complete University Learning Platform"
    />
    <meta
      name="description"
      content="A comprehensive learning platform for university students. Access study materials, interactive quizzes, and AI-powered academic guidance. Join thousands of successful students."
    />
    <meta
      name="keywords"
      content="university education, study materials, quizzes, notes, university, students, learning, educational platform, interactive quizzes, academic resources"
    />
    <meta name="author" content="Uni-Hub Team" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://uni-hub.com/" />
    <meta
      property="og:title"
      content="Uni-Hub | Your Complete University Learning Platform"
    />
    <meta
      property="og:description"
      content="A comprehensive learning platform for university students. Access study materials, interactive quizzes, and AI-powered academic guidance."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="Uni-Hub" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ar_SA" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://uni-hub.com/" />
    <meta
      name="twitter:title"
      content="Uni-Hub | Your Complete University Learning Platform"
    />
    <meta
      name="twitter:description"
      content="A comprehensive learning platform for university students. Access study materials, interactive quizzes, and AI-powered academic guidance."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Theme & App Meta -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Uni-Hub" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://uni-hub.com/" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
